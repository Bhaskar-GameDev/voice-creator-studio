services:
  - type: web
    name: voice-studio
    runtime: node
    plan: free
    # Build a standalone Node server (vite.config.ts sets nitro preset "node-server").
    # Use `npm install` not `npm ci`: npm ci mishandles esbuild's cross-platform
    # optional deps (EBADPLATFORM on @esbuild/aix-ppc64). npm install selects the
    # correct platform binary and skips the rest.
    buildCommand: npm install && npm run build
    # Nitro node-server entry; binds to $PORT automatically.
    startCommand: node .output/server/index.mjs
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
